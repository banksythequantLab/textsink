<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9AA3B8"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#50FF96"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFC107"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF7BAC"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="14" fill="#0A0D16"/>

  <!-- title -->
  <text x="48" y="52" fill="#F4F6FA" font-size="26" font-weight="bold">Text<tspan fill="#FFC107">Sink</tspan> architecture</text>
  <text x="48" y="78" fill="#9AA3B8" font-size="14">One grounding. Three products. Gemma 4 does every creative job.</text>

  <!-- CLIP -->
  <rect x="48" y="130" width="150" height="76" rx="10" fill="#161C2B" stroke="#273049"/>
  <text x="123" y="163" fill="#F4F6FA" font-size="16" font-weight="bold" text-anchor="middle">CLIP</text>
  <text x="123" y="186" fill="#9AA3B8" font-size="12" text-anchor="middle">30s–2min video</text>

  <!-- FRAMES -->
  <rect x="248" y="130" width="170" height="76" rx="10" fill="#161C2B" stroke="#273049"/>
  <text x="333" y="158" fill="#F4F6FA" font-size="15" font-weight="bold" text-anchor="middle">FRAMES</text>
  <text x="333" y="178" fill="#9AA3B8" font-size="12" text-anchor="middle">ffmpeg · timestamped</text>
  <text x="333" y="194" fill="#9AA3B8" font-size="12" text-anchor="middle">whole timeline</text>

  <!-- GEMMA 4 VISION -->
  <rect x="468" y="118" width="240" height="100" rx="10" fill="#1B2236" stroke="#FFC107" stroke-width="1.5"/>
  <text x="588" y="150" fill="#FFC107" font-size="17" font-weight="bold" text-anchor="middle">GEMMA 4 VISION</text>
  <text x="588" y="172" fill="#F4F6FA" font-size="13" text-anchor="middle">scene facts · strict JSON</text>
  <text x="588" y="196" fill="#9AA3B8" font-size="12" text-anchor="middle">retry · refuse to caption blind</text>

  <!-- flow arrows -->
  <line x1="198" y1="168" x2="242" y2="168" stroke="#9AA3B8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="418" y1="168" x2="462" y2="168" stroke="#9AA3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- branch arrows from vision to each stage -->
  <path d="M 648 218 C 648 300 632 340 626 382" fill="none" stroke="#FFC107" stroke-width="2" marker-end="url(#arrA)"/>
  <path d="M 680 218 C 700 330 668 440 640 506" fill="none" stroke="#FF7BAC" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- branch 1: scored -->
  <rect x="470" y="262" width="300" height="78" rx="10" fill="#161C2B" stroke="#273049"/>
  <text x="620" y="290" fill="#F4F6FA" font-size="14" font-weight="bold" text-anchor="middle">4 TONE CONTRACTS</text>
  <text x="620" y="310" fill="#9AA3B8" font-size="12" text-anchor="middle">distinct comedic mechanisms</text>
  <text x="620" y="327" fill="#9AA3B8" font-size="12" text-anchor="middle">best-of-3 drafts · self-judged</text>
  <line x1="588" y1="218" x2="600" y2="256" stroke="#50FF96" stroke-width="2" marker-end="url(#arrG)"/>

  <rect x="862" y="262" width="290" height="78" rx="10" fill="#122619" stroke="#50FF96" stroke-width="1.5"/>
  <text x="1007" y="292" fill="#50FF96" font-size="16" font-weight="bold" text-anchor="middle">results.json</text>
  <text x="1007" y="315" fill="#F4F6FA" font-size="12" text-anchor="middle">the scored Track 2 contract</text>
  <line x1="770" y1="300" x2="856" y2="300" stroke="#50FF96" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- branch 2: CC -->
  <rect x="470" y="388" width="300" height="76" rx="10" fill="#161C2B" stroke="#273049"/>
  <text x="620" y="416" fill="#F4F6FA" font-size="14" font-weight="bold" text-anchor="middle">TIME-SEGMENTED BEATS</text>
  <text x="620" y="438" fill="#9AA3B8" font-size="12" text-anchor="middle">one consistent voice per style</text>
  <line x1="770" y1="425" x2="856" y2="425" stroke="#FFC107" stroke-width="2" marker-end="url(#arrA)"/>

  <rect x="862" y="388" width="290" height="76" rx="10" fill="#2B2410" stroke="#FFC107" stroke-width="1.5"/>
  <text x="1007" y="416" fill="#FFC107" font-size="16" font-weight="bold" text-anchor="middle">TextSink CC</text>
  <text x="1007" y="439" fill="#F4F6FA" font-size="12" text-anchor="middle">timed captions · .srt / .ass / .mp4</text>

  <!-- branch 3: hecklers -->
  <rect x="470" y="512" width="300" height="76" rx="10" fill="#161C2B" stroke="#273049"/>
  <text x="620" y="540" fill="#F4F6FA" font-size="14" font-weight="bold" text-anchor="middle">TWO LIVE PERSONAS</text>
  <text x="620" y="562" fill="#9AA3B8" font-size="12" text-anchor="middle">Gemma 4 vs gpt-oss · turn by turn</text>
  <line x1="770" y1="548" x2="856" y2="548" stroke="#FF7BAC" stroke-width="2" marker-end="url(#arrP)"/>

  <rect x="862" y="512" width="290" height="76" rx="10" fill="#2A1420" stroke="#FF7BAC" stroke-width="1.5"/>
  <text x="1007" y="540" fill="#FF7BAC" font-size="16" font-weight="bold" text-anchor="middle">The Hecklers</text>
  <text x="1007" y="563" fill="#F4F6FA" font-size="12" text-anchor="middle">live two-model argument · .mp4</text>

  <!-- teaches loop -->
  <rect x="48" y="262" width="370" height="78" rx="10" fill="#161C2B" stroke="#273049" stroke-dasharray="5 4"/>
  <text x="233" y="290" fill="#FFC107" font-size="13" font-weight="bold" text-anchor="middle">GEMMA TEACHES GEMMA</text>
  <text x="233" y="310" fill="#9AA3B8" font-size="12" text-anchor="middle">judged winners → SFT dataset → textsink-g3-captioner</text>
  <text x="233" y="327" fill="#F4F6FA" font-size="12" font-weight="bold" text-anchor="middle">student beats teacher 18–4</text>

  <!-- footer -->
  <text x="48" y="616" fill="#9AA3B8" font-size="12">Reliability ladder: Gemma 4 deployment → serverless models → direct frame captioning · an empty caption is structurally impossible</text>
</svg>
